<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DX1 II 蓝牙桥接 控制面板</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f6f7f9;
      color: #1d2430;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(860px, 100%);
      background: #ffffff;
      border: 1px solid #d9dee7;
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(30, 39, 52, 0.10);
      padding: 22px;
    }

    h1 { margin: 0 0 6px; font-size: 24px; }
    .status { margin: 0 0 8px; color: #526071; font-size: 14px; }
    .hint { margin: 0 0 18px; color: #7c8898; font-size: 12px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    section {
      border: 1px solid #e2e6ee;
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfe;
    }

    h2 { margin: 0 0 12px; font-size: 15px; font-weight: 650; }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: 8px 0;
    }

    button, input, select {
      min-height: 38px;
      border: 1px solid #cbd3df;
      border-radius: 6px;
      background: #ffffff;
      color: inherit;
      padding: 0 12px;
      font: inherit;
    }

    button { cursor: pointer; font-weight: 600; }
    button.primary { background: #235ea8; border-color: #235ea8; color: #ffffff; }
    button.active { background: #2f8f4e; border-color: #2f8f4e; color: #ffffff; }
    input[type="number"] { width: 92px; }

    pre {
      margin: 16px 0 0;
      max-height: 220px;
      overflow: auto;
      background: #111827;
      color: #d7e3f3;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    @media (prefers-color-scheme: dark) {
      :root { background: #10141b; color: #edf2f8; }
      main, section, button, input, select { background: #171e28; border-color: #334154; }
      section { background: #131a23; }
      .status { color: #a8b4c4; }
      .hint { color: #6b7688; }
    }
  </style>
</head>
<body>
  <main>
    <h1>DX1 II 蓝牙桥接 控制面板</h1>
    <p id="status" class="status">正在获取状态...</p>
    <p class="hint">
      这个页面只是手动控制用的仪表盘。Cardputer-Adv 发出的 Ctrl+Alt+ 快捷键由后台
      dx1-bridge 服务全局捕获并直接写入 DX1 II，<b>不需要本页面处于焦点或保持打开</b>。
    </p>

    <div class="grid">
      <section>
        <h2>连接</h2>
        <div class="row">
          <button id="connect" class="primary">连接 DX1 II</button>
          <button id="disconnect">断开</button>
        </div>
      </section>

      <section>
        <h2>音量</h2>
        <div class="row">
          <button id="volDown">-</button>
          <input id="volumeDb" type="number" min="-99" max="0" step="0.5" value="-30" aria-label="当前音量 dB" />
          <span>dB</span>
          <button id="volUp">+</button>
        </div>
        <div class="row">
          <button id="applyVolume">发送音量</button>
        </div>
      </section>

      <section>
        <h2>静音</h2>
        <div class="row">
          <button id="muteToggle">静音切换</button>
        </div>
      </section>

      <section>
        <h2>输入</h2>
        <div class="row">
          <button id="input0">USB</button>
          <button id="input1">OPT</button>
        </div>
      </section>

      <section>
        <h2>输出</h2>
        <div class="row">
          <button id="output0">耳放</button>
          <button id="output1">LO</button>
          <button id="output2">ALL</button>
        </div>
      </section>

      <section>
        <h2>Cardputer 蓝牙快捷键</h2>
        <div class="row" style="font-size:13px; line-height:1.7; flex-direction:column; align-items:flex-start;">
          <span>Ctrl+Alt+C / X 连接 / 断开</span>
          <span>Ctrl+Alt+1 / 2 音量 -/+</span>
          <span>Ctrl+Alt+M 静音切换</span>
          <span>Ctrl+Alt+I 输入切换</span>
          <span>Ctrl+Alt+O 输出切换</span>
          <span>P / N / B 播放暂停 / 下一曲 / 上一曲 (系统媒体键)</span>
        </div>
      </section>
    </div>

    <pre id="log" aria-label="日志"></pre>
  </main>

  <script>
    const statusEl = document.querySelector("#status");
    const logEl = document.querySelector("#log");
    const volumeDbEl = document.querySelector("#volumeDb");

    function log(message, data) {
      const time = new Date().toLocaleTimeString();
      const suffix = data === undefined ? "" : ` ${JSON.stringify(data)}`;
      logEl.textContent = `[${time}] ${message}${suffix}\n${logEl.textContent}`;
    }

    async function sendCommand(action, value) {
      try {
        const res = await fetch("/api/command", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(value === undefined ? { action } : { action, value }),
        });
        const state = await res.json();
        applyState(state);
        log("command", { action, value });
      } catch (error) {
        log("error", { message: error.message });
      }
    }

    function applyState(state) {
      statusEl.textContent = state.connected
        ? `已连接 · ${state.lastAction || ""}`
        : `未连接 · ${state.lastAction || ""}`;
      if (document.activeElement !== volumeDbEl) {
        volumeDbEl.value = Number(state.volumeDb).toFixed(1);
      }

      document.querySelector("#input0").classList.toggle("active", state.input === 0);
      document.querySelector("#input1").classList.toggle("active", state.input === 1);
      document.querySelector("#output0").classList.toggle("active", state.output === 0);
      document.querySelector("#output1").classList.toggle("active", state.output === 1);
      document.querySelector("#output2").classList.toggle("active", state.output === 2);
      document.querySelector("#muteToggle").classList.toggle("active", !!state.muted);
    }

    async function pollState() {
      try {
        const res = await fetch("/api/state");
        applyState(await res.json());
      } catch (error) {
        statusEl.textContent = "无法连接到 dx1-bridge 服务 (确认 node server.js 正在运行)";
      }
    }

    document.querySelector("#connect").addEventListener("click", () => sendCommand("connect"));
    document.querySelector("#disconnect").addEventListener("click", () => sendCommand("disconnect"));
    document.querySelector("#volDown").addEventListener("click", () => sendCommand("volumeDown"));
    document.querySelector("#volUp").addEventListener("click", () => sendCommand("volumeUp"));
    document.querySelector("#applyVolume").addEventListener("click", () =>
      sendCommand("setVolume", Number(volumeDbEl.value))
    );
    document.querySelector("#muteToggle").addEventListener("click", () => sendCommand("muteToggle"));
    document.querySelector("#input0").addEventListener("click", () => sendCommand("setInput", 0));
    document.querySelector("#input1").addEventListener("click", () => sendCommand("setInput", 1));
    document.querySelector("#output0").addEventListener("click", () => sendCommand("setOutput", 0));
    document.querySelector("#output1").addEventListener("click", () => sendCommand("setOutput", 1));
    document.querySelector("#output2").addEventListener("click", () => sendCommand("setOutput", 2));

    pollState();
    setInterval(pollState, 1000);
  </script>
</body>
</html>
